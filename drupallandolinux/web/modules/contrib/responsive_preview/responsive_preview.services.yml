services:
  cache_context.route.is_admin:
    class: Drupal\responsive_preview\Cache\RouteAdminCacheContext
    arguments: ['@router.admin_context']
    tags:
      - { name: cache.context }
  responsive_preview:
    class: Drupal\responsive_preview\ResponsivePreview
    arguments:
      - '@router.admin_context'
      - '@current_route_match'
      - '@entity_type.manager'
      - '@current_user'
      - '@request_stack'
